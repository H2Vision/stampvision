name: Revisar Alertas de Producción

on:
  schedule:
    # México (CST = UTC-6). GitHub Actions usa UTC siempre.
    # Turno 1 arranca 6:00am CST  = 12:00 UTC  (Lun-Sab)
    # Turno 2 arranca 2:00pm CST  = 20:00 UTC  (Lun-Sab)
    # Turno 3 arranca 10:00pm CST = 04:00 UTC  (Mar-Dom)
    - cron: "0 12 * * 1-6"
    - cron: "0 20 * * 1-6"
    - cron: "0 4 * * 0-6"

  workflow_dispatch:               # También se puede lanzar manualmente desde GitHub

jobs:
  check:
    name: Verificar umbrales OEE y Scrap
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Llamar a /api/alertas/check
        run: |
          RESPONSE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST "${{ secrets.APP_URL }}/api/alertas/check" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")

          echo "HTTP Status: $RESPONSE"
          echo "Response body:"
          cat /tmp/response.json

          if [ "$RESPONSE" != "200" ]; then
            echo "❌ Error: el endpoint respondió con HTTP $RESPONSE"
            exit 1
          fi

          echo "✅ Revisión completada"
